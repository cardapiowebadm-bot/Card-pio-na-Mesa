<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA primary configuration -->
    <title>Cardápio na Mesa</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#e11d48" />
    <meta name="description" content="Cardápio digital moderno e pedidos em tempo real diretamente da mesa." />

    <!-- iOS capability meta and touch icon -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CardápioMesa" />
    <link rel="apple-touch-icon" href="/icon-192.jpg" />
    <link rel="icon" type="image/jpeg" href="/icon-192.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[PWA] Service Worker registrado com sucesso scope:', reg.scope))
            .catch((err) => console.error('[PWA] Erro ao registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
